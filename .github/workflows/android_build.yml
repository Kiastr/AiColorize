name: Android Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4 # 升级到 v4

      - name: Set up Java
        uses: actions/setup-java@v4 # 升级到 v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd android
          flutter pub get

      - name: Build APK
        run: |
          cd android
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4 # 升级到 v4，解决弃用问题
        with:
          name: release-apk
          path: android/build/app/outputs/flutter-apk/app-release.apk
